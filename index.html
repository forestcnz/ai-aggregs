<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tauri.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- opencode.ai 风格：全站等宽字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;450;500;600;700&display=swap" rel="stylesheet">
    <title>ai-aggregs — AI API 聚合网关</title>
    <style>
      /* Vue 挂载前的加载占位 —— 挂载后 #app 内容会被自动替换 */
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #fcfafa;
        color: #646363;
        font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          'Liberation Mono', 'Courier New', monospace;
      }
      #app-loading .spinner {
        width: 26px;
        height: 26px;
        border: 2px solid rgba(8, 8, 8, 0.12);
        border-top-color: #1f1e1e;
        border-radius: 50%;
        animation: app-pre-spin 0.8s linear infinite;
      }
      #app-loading .brand {
        font-size: 15px;
        font-weight: 600;
        color: #1f1e1e;
        letter-spacing: -0.01em;
      }
      #app-loading .sub {
        font-size: 11px;
        color: #999898;
      }
      @keyframes app-pre-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-loading .spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- Vue 挂载前的加载占位 —— 挂载后会被应用内容替换 -->
      <div id="app-loading">
        <div class="spinner"></div>
        <div class="brand">AI 聚合网关</div>
        <div class="sub">正在启动…</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
