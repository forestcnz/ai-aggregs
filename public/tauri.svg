<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 三流汇聚 · 纯线条 · 方头描边 · opencode.ai 风格 -->
  <!-- 输入流（黑 / 灰 / 黑，象征多个提供商与三种协议） -->
  <path d="M5 19 C 21 19, 25 31, 33 32" fill="none" stroke="#1f1e1e" stroke-width="2.4" stroke-linecap="square"/>
  <path d="M5 32 L 33 32" fill="none" stroke="#999898" stroke-width="2.4" stroke-linecap="square"/>
  <path d="M5 45 C 21 45, 25 33, 33 32" fill="none" stroke="#1f1e1e" stroke-width="2.4" stroke-linecap="square"/>
  <!-- 汇聚后的单一输出流 -->
  <path d="M33 32 L 59 32" fill="none" stroke="#1f1e1e" stroke-width="2.6" stroke-linecap="square"/>
  <!-- 中心网关节点（菱形 · 描边） -->
  <rect x="29" y="28" width="8" height="8" rx="1" transform="rotate(45 33 32)" fill="none" stroke="#1f1e1e" stroke-width="2.2"/>
</svg>
